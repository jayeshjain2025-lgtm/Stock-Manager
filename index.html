<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            animation: slideIn 0.5s ease;
        }

        .header h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-item .label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-item .value {
            font-size: 2em;
            font-weight: bold;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            animation: slideIn 0.5s ease;
        }

        .card h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #f8f9ff;
        }

        input.error {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }

        input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.9em;
            min-width: auto;
        }

        .btn-decrease {
            background: #e74c3c;
            color: white;
        }

        .btn-decrease:hover {
            background: #c0392b;
        }

        .btn-increase {
            background: #27ae60;
            color: white;
        }

        .btn-increase:hover {
            background: #229954;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            flex: 0 1 auto;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        thead {
            background: #f8f9fa;
            border-top: 2px solid #667eea;
            border-bottom: 2px solid #667eea;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            color: #667eea;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f8f9ff;
        }

        .low-stock {
            background-color: #fff3cd !important;
        }

        .low-stock-badge {
            display: inline-block;
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
            margin-left: 8px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .qty-display {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1em;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.active {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert.warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }

        .close-alert {
            float: right;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-primary {
                width: 100%;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 10px;
            }

            .qty-controls {
                flex-direction: column;
                gap: 5px;
            }

            .card {
                padding: 20px;
            }

            .header {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5em;
                gap: 8px;
            }

            .card {
                padding: 15px;
            }

            th, td {
                padding: 8px;
                font-size: 0.8em;
            }

            button {
                padding: 10px 16px;
                font-size: 0.9em;
            }

            .btn-small {
                padding: 6px 10px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Stock Manager</h1>
            <p>Manage your inventory efficiently</p>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="label">Total Products</div>
                    <div class="value" id="productCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">Inventory Value</div>
                    <div class="value" id="totalValue">$0.00</div>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <div class="card">
            <h2>➕ Add New Product</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="pId">Product ID</label>
                    <input type="number" id="pId" placeholder="101" min="1" max="999999">
                </div>
                <div class="form-group">
                    <label for="pName">Product Name</label>
                    <input type="text" id="pName" placeholder="e.g., Laptop" maxlength="63">
                </div>
                <div class="form-group">
                    <label for="pPrice">Price ($)</label>
                    <input type="number" id="pPrice" step="0.01" placeholder="99.99" min="0.01" max="999999">
                </div>
                <div class="form-group">
                    <label for="pQty">Quantity</label>
                    <input type="number" id="pQty" placeholder="50" min="0" max="999999">
                </div>
                <div class="form-group">
                    <button class="btn-primary" onclick="addProduct()">Add Product</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📊 Current Inventory</h2>
            <div class="loading active" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Loading WASM Engine...</p>
            </div>
            <div class="table-container" id="tableContainer" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total Value</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m0 0l8 4m-8-4v10l8 4m0-10l8-4m-8 4v10l8-4m0 0l-8-4" />
                </svg>
                <h3>No Products Yet</h3>
                <p>Add your first product using the form above</p>
            </div>
        </div>
    </div>

    <script src="stock.js"></script>
    <script>
        let wasmReady = false;

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert ${type} active`;
            alert.innerHTML = `${message}<span class="close-alert" onclick="this.parentElement.remove();">&times;</span>`;
            alertContainer.appendChild(alert);
            setTimeout(() => alert.classList.remove('active'), 5000);
            setTimeout(() => alert.remove(), 5500);
        }

        function clearForm() {
            document.getElementById('pId').value = '';
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pQty').value = '';
        }

        function clearInputErrors() {
            document.querySelectorAll('input').forEach(input => input.classList.remove('error'));
        }

        function validateForm() {
            clearInputErrors();
            const id = document.getElementById('pId');
            const name = document.getElementById('pName');
            const price = document.getElementById('pPrice');
            const qty = document.getElementById('pQty');

            let isValid = true;

            if (!id.value || id.value <= 0) {
                id.classList.add('error');
                isValid = false;
            }
            if (!name.value.trim()) {
                name.classList.add('error');
                isValid = false;
            }
            if (!price.value || price.value <= 0) {
                price.classList.add('error');
                isValid = false;
            }
            if (qty.value === '' || qty.value < 0) {
                qty.classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        function addProduct() {
            if (!wasmReady) {
                showAlert('WASM Engine not ready', 'error');
                return;
            }

            if (!validateForm()) {
                showAlert('Please fill in all fields correctly', 'error');
                return;
            }

            const id = parseInt(document.getElementById('pId').value);
            const name = document.getElementById('pName').value.trim();
            const price = parseFloat(document.getElementById('pPrice').value);
            const qty = parseInt(document.getElementById('pQty').value);

            const result = Module.ccall('add_product', 'number', ['number', 'string', 'number', 'number'], [id, name, price, qty]);
            
            if (result === -1) {
                showAlert('❌ Inventory is full! Maximum capacity reached.', 'error');
            } else if (result === 0) {
                showAlert('❌ Product ID already exists! Use a different ID.', 'error');
            } else {
                showAlert('✓ Product added successfully!', 'success');
                clearForm();
                renderTable();
            }
        }

        function updateStock(id, amount) {
            if (!wasmReady) {
                showAlert('WASM Engine not ready', 'error');
                return;
            }

            const result = Module.ccall('update_product_stock', 'number', ['number', 'number'], [id, amount]);
            if (result === -1) {
                showAlert('❌ Insufficient stock! Cannot sell more than available.', 'warning');
            } else if (result === 0) {
                showAlert('❌ Product not found!', 'error');
            } else {
                renderTable();
            }
        }

        function deleteProduct(id) {
            if (!wasmReady) {
                showAlert('WASM Engine not ready', 'error');
                return;
            }

            if (confirm(`⚠️ Are you sure you want to delete product ID ${id}? This cannot be undone.`)) {
                const result = Module.ccall('delete_product_by_id', 'number', ['number'], [id]);
                if (result === 0) {
                    showAlert('❌ Product not found!', 'error');
                } else {
                    showAlert('✓ Product deleted successfully!', 'success');
                    renderTable();
                }
            }
        }

        function renderTable() {
            const count = Module.ccall('get_product_count', 'number', [], []);
            const tbody = document.getElementById('inventoryBody');
            const tableContainer = document.getElementById('tableContainer');
            const emptyState = document.getElementById('emptyState');

            tbody.innerHTML = '';

            if (count === 0) {
                tableContainer.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                tableContainer.style.display = 'block';

                for (let i = 0; i < count; i++) {
                    const id = Module.ccall('get_product_id', 'number', ['number'], [i]);
                    const name = Module.ccall('get_product_name', 'string', ['number'], [i]);
                    const price = Module.ccall('get_product_price', 'number', ['number'], [i]);
                    const qty = Module.ccall('get_product_quantity', 'number', ['number'], [i]);
                    const totalValue = price * qty;

                    const tr = document.createElement('tr');
                    if (qty < 5) tr.className = 'low-stock';

                    const lowStockWarning = qty < 5 ? '<span class="low-stock-badge">Low Stock</span>' : '';

                    tr.innerHTML = `
                        <td><strong>${id}</strong></td>
                        <td>${name}${lowStockWarning}</td>
                        <td>$${price.toFixed(2)}</td>
                        <td>
                            <div class="qty-controls">
                                <button class="btn-small btn-decrease" onclick="updateStock(${id}, -1)" title="Decrease quantity">−</button>
                                <span class="qty-display">${qty}</span>
                                <button class="btn-small btn-increase" onclick="updateStock(${id}, 1)" title="Increase quantity">+</button>
                            </div>
                        </td>
                        <td><strong>$${totalValue.toFixed(2)}</strong></td>
                        <td><button class="btn-small btn-delete" onclick="deleteProduct(${id})">Delete</button></td>
                    `;
                    tbody.appendChild(tr);
                }
            }

            document.getElementById('productCount').innerText = count;
            document.getElementById('totalValue').innerText = '$' + Module.ccall('get_total_value', 'number', [], []).toFixed(2);
        }

        Module.onRuntimeInitialized = () => {
            wasmReady = true;
            document.getElementById('loadingSpinner').classList.remove('active');
            renderTable();
            showAlert('✓ Application loaded successfully!', 'success');
        };
    </script>
</body>
</html>
