<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="container">
    <header class="hero card">
      <h1>📦 Stock Manager</h1>
      <p>Aesthetic, interactive inventory management for small shops.</p>
      <div class="hero-actions">
        <button id="saveFileBtn" class="btn secondary">Export JSON</button>
        <label class="btn secondary file-label" for="loadFileInput">Import JSON</label>
        <input id="loadFileInput" type="file" accept="application/json" hidden />
        <button id="resetBtn" class="btn danger">Reset Inventory</button>
      </div>
    </header>

    <section class="stats grid-4">
      <article class="card stat">
        <h3>Total Products</h3>
        <p id="statCount">0</p>
      </article>
      <article class="card stat">
        <h3>Total Units</h3>
        <p id="statUnits">0</p>
      </article>
      <article class="card stat">
        <h3>Total Value</h3>
        <p id="statValue">$0.00</p>
      </article>
      <article class="card stat">
        <h3>Low Stock Items</h3>
        <p id="statLow">0</p>
      </article>
    </section>

    <section class="grid-2">
      <article class="card">
        <h2>Add Product</h2>
        <form id="addForm" class="form-grid">
          <input id="productId" type="number" placeholder="Product ID" min="1" required />
          <input id="productName" type="text" placeholder="Name" maxlength="63" required />
          <input id="productPrice" type="number" step="0.01" min="0.01" placeholder="Price" required />
          <input id="productQty" type="number" min="0" placeholder="Quantity" required />
          <button class="btn" type="submit">Add Product</button>
        </form>
      </article>

      <article class="card">
        <h2>Stock Update</h2>
        <form id="stockForm" class="form-grid">
          <input id="stockProductId" type="number" min="1" placeholder="Product ID" required />
          <select id="stockType">
            <option value="purchase">Purchase (increase)</option>
            <option value="sale">Sale (decrease)</option>
          </select>
          <input id="stockAmount" type="number" min="1" placeholder="Amount" required />
          <button class="btn" type="submit">Update Stock</button>
        </form>
      </article>
    </section>

    <section class="grid-2">
      <article class="card">
        <h2>Search / Delete</h2>
        <form id="searchForm" class="form-inline">
          <input id="searchId" type="number" min="1" placeholder="Search by Product ID" required />
          <button class="btn secondary" type="submit">Search</button>
          <button id="deleteBtn" class="btn danger" type="button">Delete</button>
        </form>
        <p id="searchResult" class="muted">No product selected.</p>
      </article>

      <article class="card">
        <h2>Low-Stock Report</h2>
        <form id="lowForm" class="form-inline">
          <input id="threshold" type="number" min="0" value="5" required />
          <button class="btn secondary" type="submit">Apply Threshold</button>
        </form>
        <ul id="lowList" class="list"></ul>
      </article>
    </section>

    <section class="card">
      <h2>Inventory Table</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </section>

    <p id="toast" class="toast" aria-live="polite"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
