<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager - Cashier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            animation: slideIn 0.5s ease;
        }

        .header h1 {
            font-size: 2.5em;
            color: #38a169;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .nav-bar {
            background: white;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #38a169;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: #38a169;
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-role {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .checkout-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.5s ease;
        }

        .card h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #38a169;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-search {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #38a169;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .product-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .product-item:hover {
            border-color: #38a169;
            background: #e8f5e8;
        }

        .product-item.selected {
            border-color: #38a169;
            background: #d4edda;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-price {
            color: #38a169;
            font-weight: bold;
        }

        .product-stock {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .cart-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .cart-panel h3 {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #38a169;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
        }

        .cart-item-price {
            color: #38a169;
            font-size: 0.9em;
        }

        .cart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            background: #38a169;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .qty-display {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
            text-align: center;
        }

        .total-amount {
            font-size: 1.5em;
            font-weight: bold;
            color: #38a169;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 178, 169, 0.3);
        }

        .checkout-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .receipt-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .receipt-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #38a169;
            padding-bottom: 15px;
        }

        .receipt-title {
            font-size: 1.5em;
            color: #38a169;
            margin-bottom: 5px;
        }

        .receipt-date {
            color: #666;
            font-size: 0.9em;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .receipt-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #38a169;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            color: #38a169;
        }

        .receipt-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            flex: 1;
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            flex: 1;
            background: #38a169;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }

            .nav-bar {
                flex-direction: column;
                gap: 15px;
            }

            .nav-links {
                justify-content: center;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Cashier Terminal</h1>
            <p>Point of sale system for customer transactions</p>
        </div>

        <div class="nav-bar">
            <div class="nav-links">
                <a href="#checkout" class="active">Checkout</a>
                <a href="#inventory">View Stock</a>
                <a href="#receipts">Receipts</a>
            </div>
            <div class="user-info">
                <span class="user-role">🛒 Cashier</span>
                <a href="index.html" style="background: #e74c3c; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.9em;">Logout</a>
            </div>
        </div>

        <div class="checkout-layout">
            <div class="main-panel">
                <div class="card">
                    <h2>🔍 Product Search</h2>
                    <div class="product-search">
                        <input type="text" class="search-input" id="productSearch" placeholder="Scan barcode or search product name..." oninput="searchProducts()">
                    </div>

                    <div class="product-grid" id="productGrid">
                        <!-- Products will be populated here -->
                    </div>
                </div>
            </div>

            <div class="cart-panel">
                <h3>🛒 Current Order</h3>
                <div id="cartItems">
                    <!-- Cart items will be populated here -->
                </div>

                <div class="cart-total">
                    <div>Total: <span class="total-amount" id="cartTotal">$0.00</span></div>
                </div>

                <button class="checkout-btn" id="checkoutBtn" onclick="processCheckout()" disabled>
                    💳 Process Payment
                </button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="receipt-modal" id="receiptModal">
        <div class="receipt-content">
            <div class="receipt-header">
                <div class="receipt-title">🧾 Receipt</div>
                <div class="receipt-date" id="receiptDate"></div>
            </div>

            <div id="receiptItems">
                <!-- Receipt items will be populated here -->
            </div>

            <div class="receipt-total">
                Total: <span id="receiptTotal"></span>
            </div>

            <div class="receipt-actions">
                <button class="btn-secondary" onclick="printReceipt()">🖨️ Print</button>
                <button class="btn-primary" onclick="closeReceipt()">✓ Done</button>
            </div>
        </div>
    </div>

    <script>
        // Mock product data
        const products = [
            { id: 1, name: 'Laptop', price: 999.99, stock: 15, barcode: '123456789' },
            { id: 2, name: 'Mouse', price: 29.99, stock: 25, barcode: '987654321' },
            { id: 3, name: 'Keyboard', price: 79.99, stock: 12, barcode: '456789123' },
            { id: 4, name: 'Monitor', price: 299.99, stock: 8, barcode: '789123456' },
            { id: 5, name: 'Headphones', price: 149.99, stock: 20, barcode: '321654987' },
            { id: 6, name: 'USB Drive', price: 19.99, stock: 30, barcode: '654987321' }
        ];

        let cart = [];
        let currentReceipt = null;

        function searchProducts() {
            const query = document.getElementById('productSearch').value.toLowerCase();
            const filtered = products.filter(product =>
                product.name.toLowerCase().includes(query) ||
                product.barcode.includes(query)
            );
            renderProducts(filtered);
        }

        function renderProducts(productList) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            productList.forEach(product => {
                const item = document.createElement('div');
                item.className = 'product-item';
                item.onclick = () => addToCart(product.id);

                const stockStatus = product.stock > 0 ? `${product.stock} in stock` : 'Out of stock';
                const stockClass = product.stock > 0 ? '' : ' style="color: #e74c3c;"';

                item.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <div class="product-stock"${stockClass}>${stockStatus}</div>
                `;

                if (product.stock === 0) {
                    item.style.opacity = '0.6';
                    item.style.cursor = 'not-allowed';
                }

                grid.appendChild(item);
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.stock === 0) return;

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                if (existing.quantity < product.stock) {
                    existing.quantity++;
                } else {
                    alert('Not enough stock available!');
                    return;
                }
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }

            updateCart();
        }

        function updateCart() {
            const cartContainer = document.getElementById('cartItems');
            cartContainer.innerHTML = '';

            if (cart.length === 0) {
                cartContainer.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No items in cart</p>';
            } else {
                cart.forEach((item, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'cart-item';
                    itemDiv.innerHTML = `
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price.toFixed(2)} each</div>
                        </div>
                        <div class="cart-controls">
                            <button class="qty-btn" onclick="changeQuantity(${index}, -1)">−</button>
                            <span class="qty-display">${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${index})">×</button>
                        </div>
                    `;
                    cartContainer.appendChild(itemDiv);
                });
            }

            updateTotal();
        }

        function changeQuantity(index, delta) {
            const item = cart[index];
            const product = products.find(p => p.id === item.id);

            item.quantity += delta;

            if (item.quantity <= 0) {
                cart.splice(index, 1);
            } else if (item.quantity > product.stock) {
                item.quantity = product.stock;
                alert('Maximum available stock reached!');
            }

            updateCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
            document.getElementById('checkoutBtn').disabled = cart.length === 0;
        }

        function processCheckout() {
            if (cart.length === 0) return;

            // Update stock levels
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                product.stock -= item.quantity;
            });

            // Generate receipt
            currentReceipt = {
                items: [...cart],
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                date: new Date().toLocaleString()
            };

            // Clear cart
            cart = [];
            updateCart();
            renderProducts(products);

            // Show receipt
            showReceipt();
        }

        function showReceipt() {
            document.getElementById('receiptModal').style.display = 'block';
            document.getElementById('receiptDate').textContent = currentReceipt.date;

            const receiptItems = document.getElementById('receiptItems');
            receiptItems.innerHTML = '';

            currentReceipt.items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'receipt-item';
                itemDiv.innerHTML = `
                    <span>${item.name} × ${item.quantity}</span>
                    <span>$${(item.price * item.quantity).toFixed(2)}</span>
                `;
                receiptItems.appendChild(itemDiv);
            });

            document.getElementById('receiptTotal').textContent = `$${currentReceipt.total.toFixed(2)}`;
        }

        function closeReceipt() {
            document.getElementById('receiptModal').style.display = 'none';
            currentReceipt = null;
        }

        function printReceipt() {
            window.print();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'productSearch') {
                const query = document.getElementById('productSearch').value;
                if (query) {
                    // Try to find exact barcode match
                    const product = products.find(p => p.barcode === query);
                    if (product) {
                        addToCart(product.id);
                        document.getElementById('productSearch').value = '';
                        searchProducts();
                    }
                }
            }
        });
    </script>
</body>
</html>
